<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso - Rede de Proteção BV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1e272e; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; }
        .login-card { background: #2d3436; padding: 40px; border-radius: 20px; border-top: 5px solid #05c46b; width: 100%; max-width: 380px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h2 { color: white; text-align: center; font-weight: 800; text-transform: uppercase; font-size: 1.4rem; margin-bottom: 5px; }
        p { color: #05c46b; text-align: center; font-size: 0.8rem; margin-bottom: 30px; font-weight: 600; letter-spacing: 1px; }
        .form-control { background: #2f3640; border: 1px solid #485460; color: white; padding: 12px; }
        .form-control:focus { background: #2f3640; border-color: #05c46b; color: white; box-shadow: 0 0 8px rgba(5, 196, 107, 0.3); }
        .btn-entrar { background: #05c46b; color: #1e272e; border: none; width: 100%; padding: 14px; font-weight: 800; margin-top: 20px; transition: 0.3s; border-radius: 8px; }
        .btn-entrar:hover { background: #049f58; transform: translateY(-2px); }
        .error-msg { color: #eb3b5a; font-size: 0.85rem; text-align: center; margin-top: 15px; display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>REDE DE PROTEÇÃO</h2>
        <p>PAINEL DE ATENDIMENTO CAS</p>
        <form id="formLogin">
            <div class="mb-3">
                <input type="text" id="user" class="form-control" placeholder="Usuário Técnico" required autocomplete="off">
            </div>
            <div class="mb-3">
                <input type="password" id="pass" class="form-control" placeholder="Senha de Acesso" required>
            </div>
            <button type="submit" class="btn-entrar">ENTRAR NO SISTEMA</button>
            <div id="error" class="error-msg">⚠️ Usuário ou senha incorretos!</div>
        </form>
    </div>

    <script>
        document.getElementById('formLogin').addEventListener('submit', function(e) {
            e.preventDefault();
            const u = document.getElementById('user').value;
            const s = document.getElementById('pass').value;
            const error = document.getElementById('error');

            if(u === "tecnico" && s === "bv2026") {
                sessionStorage.setItem('logado_bv', 'true');
                window.location.href = "index.html"; 
            } else {
                error.style.display = 'block';
                document.getElementById('pass').value = "";
            }
        });
    </script>
</body>
</html>
