<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso - Rede de Proteção BV</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #1e272e;
            --accent-green: #05c46b;
            --input-bg: #2f3640;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            background: #2d3436;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border-top: 5px solid var(--accent-green);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h2 {
            color: white;
            font-weight: 800;
            font-size: 1.5rem;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-header p {
            color: var(--accent-green);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .form-label {
            color: #bdc3c7;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .input-group-text {
            background-color: var(--input-bg);
            border: 1px solid #485460;
            color: var(--accent-green);
        }

        .form-control {
            background-color: var(--input-bg);
            border: 1px solid #485460;
            color: white;
            padding: 12px;
        }

        .form-control:focus {
            background-color: var(--input-bg);
            border-color: var(--accent-green);
            color: white;
            box-shadow: none;
        }

        .btn-entrar {
            background-color: var(--accent-green);
            color: #1e272e;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            font-weight: 800;
            margin-top: 20px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-entrar:hover {
            background-color: #049f58;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(5, 196, 107, 0.3);
        }

        .footer-text {
            text-align: center;
            margin-top: 25px;
            color: #7f8c8d;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <h2>REDE DE PROTEÇÃO</h2>
            <p>Gestão Territorial - Boa Vista</p>
        </div>

        <form id="formLoginBV">
            <div class="mb-3">
                <label class="form-label">Identificação do Técnico</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                    <input type="text" id="userBV" class="form-control" placeholder="Usuário" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Senha de Acesso</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
                    <input type="password" id="passBV" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-entrar">
                Acessar Mapas <i class="bi bi-geo-fill ms-2"></i>
            </button>
        </form>

        <div class="footer-text">
            SISTEMA DE MONITORAMENTO ESTRATÉGICO <br>
            Acesso exclusivo para servidores autorizados.
        </div>
    </div>

    <script>
        document.getElementById('formLoginBV').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const usuario = document.getElementById('userBV').value;
            const senha = document.getElementById('passBV').value;

            // Define aqui os dados de acesso para este painel específico
            if(usuario === "tecnico" && senha === "cas2026") {
                
                // Salva a sessão (Opção 1)
                sessionStorage.setItem('logado', 'true');
                
                // Redireciona para o arquivo do Painel BV 
                // (Certifique-se de que o nome do arquivo do painel seja 'painel-bv.html')
                window.location.href = "index-bv.html"; 
                
            } else {
                alert("Credenciais incorretas para a Rede de Proteção!");
            }
        });
    </script>

</body>
</html>
