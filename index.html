<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel CAS - Gestão Territorial</title>
    
    <script>
        if (sessionStorage.getItem('logado_bv') !== 'true') {
            window.location.href = "login.html";
        }
    </script>

    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Segoe UI', sans-serif; overflow: hidden; background-color: #1e272e; 
            display: flex; 
        }
        
        /* Barra Lateral Esquerda */
        .sidebar-left {
            width: 260px;
            background: #1e272e;
            border-right: 2px solid #05c46b;
            display: flex;
            flex-direction: column;
            padding: 15px;
            gap: 6px;
            box-shadow: 4px 0 12px rgba(0,0,0,0.5);
            overflow-y: auto;
            z-index: 1000;
        }

        .sidebar-left h1 { 
            font-size: 14px; color: #05c46b; text-transform: uppercase; 
            font-weight: 800; margin-bottom: 20px; text-align: center;
            border-bottom: 1px solid #34495e; padding-bottom: 10px;
        }

        /* Área do Conteúdo e Rodapé Oficial */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }

        #content-frame { 
            flex: 1; 
            border: none; 
            background: #f1f2f6; 
        }

        /* Rodapé Institucional SETRABES */
        .setrabes-footer {
            background: #f8f9fa;
            color: #2f3640;
            padding: 10px 20px;
            border-top: 1px solid #dcdde1;
            font-size: 11px;
            text-align: center;
            line-height: 1.4;
        }

        .setrabes-footer strong { color: #05c46b; text-transform: uppercase; }

        /* Botões da Navegação */
        .btn-nav {
            background: #485460; color: white; border: none; padding: 12px;
            cursor: pointer; border-radius: 6px; font-size: 10px; font-weight: 700;
            transition: 0.2s; text-transform: uppercase; text-align: left;
            display: flex; align-items: center; gap: 10px;
        }

        .btn-nav:hover { background: #05c46b; color: #1e272e; }
        .btn-nav.active { background: #05c46b; color: #1e272e; box-shadow: 0 0 10px rgba(5, 196, 107, 0.4); }

        .btn-prioridade { border-left: 4px solid #05c46b; background: #34495e; }
        .btn-google-form { background: #27ae60 !important; color: white; }
        .btn-google-sheet { background: #2980b9 !important; color: white; margin-bottom: 15px; }
        
        .btn-sair { 
            background: #eb3b5a; color: white; border: none; padding: 12px; 
            border-radius: 6px; font-size: 11px; font-weight: 800; 
            cursor: pointer; margin-top: auto; text-align: center; 
        }

        @media (max-width: 800px) {
            body { flex-direction: column; }
            .sidebar-left { width: 100%; height: auto; border-right: none; border-bottom: 2px solid #05c46b; flex-direction: row; flex-wrap: wrap; }
            .setrabes-footer { font-size: 9px; }
        }
    </style>
</head>
<body>

    <nav class="sidebar-left">
        <h1>📍 Painel CAS</h1>
        
        <button class="btn-nav btn-prioridade active" onclick="carregar('vila-jardim.html', this)">🏘️ Vila Jardim</button>
        <button class="btn-nav btn-prioridade" onclick="carregar('cidade-satelite.html', this)">🛰️ Satélite</button>
        
        <button class="btn-nav btn-google-form" onclick="carregar('https://docs.google.com/forms/d/e/1FAIpQLSez0haWDLb9rjfvoaWWt0kuMg08qwKx7LLhhyRhzDOojVVxpg/viewform?embedded=true', this)">📝 Abrir Ficha</button>
        <button class="btn-nav btn-google-sheet" onclick="carregar('https://docs.google.com/spreadsheets/d/1bHXEpfJYvxkxgH1m584YorvgnGVrd1j4vYhPLuBW3AM/edit?rm=minimal', this)">📊 Planilha de Dados</button>
        
        <button class="btn-nav" onclick="carregar('cras.html', this)">🏢 CRAS</button>
        <button class="btn-nav" onclick="carregar('creas.html', this)">🏢 CREAS</button>
        <button class="btn-nav" onclick="carregar('conselho-tutelar.html', this)">🛡️ Conselho Tutelar</button>
        <button class="btn-nav" onclick="carregar('defensoria.html', this)">⚖️ Defensoria</button>
        <button class="btn-nav" onclick="carregar('raps.html', this)">🧠 RAPS</button>
        <button class="btn-nav" onclick="carregar('ficha-atendimento.html', this)">📄 Ficha Interna</button>
        
        <button class="btn-sair" onclick="logout()">SAIR</button>
    </nav>

    <main class="main-content">
        <iframe id="content-frame" src="vila-jardim.html"></iframe>

        <footer class="setrabes-footer">
            <strong>Secretaria de Estado do Trabalho e Bem-Estar Social</strong><br>
            Avenida Mário Homem de Melo, nº 2310, Mecejana - Boa Vista - Roraima – Brasil - CEP: 69304-350<br>
            E-mail: gabinetesetrabes@gmail.com
        </footer>
    </main>

    <script>
        function carregar(url, elemento) {
            const frame = document.getElementById('content-frame');
            frame.src = url;
            document.querySelectorAll('.btn-nav').forEach(btn => btn.classList.remove('active'));
            elemento.classList.add('active');
        }

        function logout() {
            if(confirm("Deseja encerrar a sessão?")) {
                sessionStorage.clear();
                window.location.href = "login.html";
            }
        }
    </script>
</body>
</html>
